spec_version: 1
name: ticket_triage_env
version: "0.1.0"
description: "Real-world customer support ticket triage environment where an agent classifies, prioritises, and routes support tickets."
type: space
runtime: fastapi
app: server.app:app
port: 8000
action: TicketTriageAction
observation: TicketTriageObservation
tasks:
  - id: easy
    name: "Straightforward Inbox"
    difficulty: easy
    description: "Triage two clear support tickets with obvious category and priority signals."
  - id: medium
    name: "Mixed Operations Queue"
    difficulty: medium
    description: "Triage three tickets spanning technical, shipping, and security concerns."
  - id: hard
    name: "High-Stakes Escalation"
    difficulty: hard
    description: "Triage four complex tickets with legal/compliance pressure, abuse risk, and technical ambiguity."
